name: Build APK Doyangopi

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle 8.2
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Extract project ZIP
        run: unzip doyangopi_kasir.zip

      - name: Generate Gradle Wrapper
        working-directory: doyangopi
        run: |
          gradle wrapper
          chmod +x gradlew

      - name: Build Debug APK
        working-directory: doyangopi
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DoyangOpi-APK
          path: doyangopi/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
